<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>お問い合わせ｜リクルートX</title>
  <meta name="description" content="リクルートXのお問い合わせフォーム。SNS運用・コンテンツ制作・Meta広告運用での採用支援について、3営業日以内にご返信いたします。">
  <meta name="robots" content="noindex">
  <!-- CSP: GA4/Clarity等のタグを追加する際は script-src / connect-src への追記が必要 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.hsforms.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+Antique:wght@400;500;700&family=Inter:wght@500;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="rx-jp-body">

  <!-- ===================== ヘッダーナビゲーション ===================== -->
  <header class="rx-nav" id="nav">
    <div class="rx-nav__inner">
      <a class="rx-nav__brand" href="index.html" aria-label="リクルートX トップへ">
        <span class="rx-nav__brand-name">Recruit&nbsp;X</span>
      </a>
      <nav class="rx-nav__menu" id="navMenu" aria-label="メインナビゲーション">
        <a class="rx-nav__link" href="index.html#service">サービス</a>
        <a class="rx-nav__link" href="case.html">事例</a>
        <a class="rx-nav__link" href="index.html#company">会社情報</a>
        <a class="rx-nav__link" href="index.html#news">お知らせ</a>
      </nav>
      <a class="rx-nav__cta" href="contact.html" aria-current="page">
        <span class="rx-nav__cta-text">お問い合わせ</span>
        <span class="rx-nav__cta-alt" aria-hidden="true">Contact</span>
      </a>
      <button class="rx-nav__hamburger" type="button" aria-label="メニューを開く" aria-expanded="false" aria-controls="navMenu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===================== お問い合わせ（HubSpot連携） ===================== -->
  <main>
    <section class="rx-contact" id="contact" aria-labelledby="contactHeading">
      <div class="rx-contact__inner">
        <p class="rx-contact__eyebrow">CONTACT</p>
        <h1 class="rx-contact__heading" id="contactHeading">お問い合わせ</h1>
        <p class="rx-contact__lead">採用のお悩み、SNS×コンテンツ×広告での解決をご相談ください。<br>3営業日以内にご返信いたします。</p>

        <form id="rx-contact-form" class="rx-form" novalidate>
          <div class="rx-form__row">
            <label class="rx-form__field">
              <span class="rx-form__label">会社名 <em>必須</em></span>
              <input type="text" name="company" required maxlength="200" autocomplete="organization">
            </label>
            <label class="rx-form__field">
              <span class="rx-form__label">部署</span>
              <input type="text" name="department" maxlength="100" autocomplete="organization-title">
            </label>
          </div>
          <div class="rx-form__row">
            <label class="rx-form__field">
              <span class="rx-form__label">お名前 <em>必須</em></span>
              <input type="text" name="fullName" required maxlength="100" autocomplete="name">
            </label>
            <label class="rx-form__field">
              <span class="rx-form__label">メールアドレス <em>必須</em></span>
              <input type="email" name="email" required maxlength="254" autocomplete="email">
            </label>
          </div>
          <label class="rx-form__field">
            <span class="rx-form__label">お問い合わせ内容 <em>必須</em></span>
            <textarea name="message" rows="6" required maxlength="4000"></textarea>
          </label>
          <!-- honeypot: 人間には見えない。botが値を入れたらJSが送信を黙って中止する -->
          <div class="rx-form__hp" aria-hidden="true">
            <label>このフィールドは空のままにしてください
              <input type="text" name="website" tabindex="-1" autocomplete="off">
            </label>
          </div>
          <button type="submit" class="rx-form__submit">
            <span>送信する</span>
            <svg class="rx-form__submit-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 10h10M10 5l5 5-5 5"/></svg>
          </button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/main.js" defer></script>
</body>
</html>
